<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Nhóm & Quỹ</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- MÀN HÌNH ĐĂNG NHẬP / ĐĂNG KÝ -->
        <div id="auth-screen" class="container">
            <h2 id="auth-title">Đăng nhập</h2>
            
            <div id="login-form">
                <input type="tel" id="login-phone" placeholder="Số điện thoại...">
                <input type="password" id="login-password" placeholder="Mật khẩu...">
                <button id="btn-login-submit" class="btn btn-primary btn-3d">Đăng nhập</button>
                <p style="margin-top: 15px; font-size: 14px;">
                    Chưa có tài khoản? <a href="#" id="link-to-register" style="color: #007bff;">Đăng ký</a> | 
                    <a href="#" id="link-forgot-pwd" style="color: #dc3545; font-weight: bold;">Quên mật khẩu?</a>
                </p>
            </div>

            <div id="register-form" class="hidden">
                <input type="text" id="reg-name" placeholder="Họ và tên...">
                <input type="tel" id="reg-phone" placeholder="Số điện thoại...">
                <input type="text" id="reg-address" placeholder="Địa chỉ...">
                <input type="password" id="reg-password" placeholder="Mật khẩu (ít nhất 8 ký tự)...">
                <input type="number" id="reg-pin" placeholder="Thiết lập mã PIN 4 số (để khôi phục mật khẩu)..." oninput="if(this.value.length > 4) this.value = this.value.slice(0, 4);">
                <button id="btn-register-submit" class="btn btn-success btn-3d">Đăng ký</button>
                <p style="margin-top: 15px; font-size: 14px;">Đã có tài khoản? <a href="#" id="link-to-login" style="color: #007bff;">Đăng nhập</a></p>
            </div>
        </div>

        <!-- MÀN HÌNH DASHBOARD -->
        <div id="dashboard-screen" class="container hidden">
            <div class="header">
                <div class="user-info">
                    <img id="user-avatar" src="" alt="Avatar" class="avatar-img">
                    <div>
                        <div id="user-name-display" style="font-weight: bold;"></div>
                        <div id="user-phone-display" style="font-size: 12px; color: gray;"></div>
                    </div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button id="btn-edit-profile" class="btn-sm btn-secondary btn-3d">⚙️ Cài đặt</button>
                    <button id="btn-logout" class="btn-sm btn-danger btn-3d">Thoát</button>
                </div>
            </div>
            <h3>Nhóm của bạn</h3>
            <div id="group-list"></div>
            <button id="btn-create-group" class="btn btn-primary btn-3d" style="margin-top: 20px;">+ Tạo nhóm mới</button>
        </div>

        <!-- MÀN HÌNH CHI TIẾT NHÓM (Ví dụ thu nhỏ, bạn giữ các phần thu chi cũ) -->
        <div id="main-screen" class="container hidden">
            <button id="btn-back-dashboard" class="btn-sm btn-secondary btn-3d" style="margin-bottom: 15px;">🔙 Trở về</button>
            <div id="member-section">
                <!-- Thanh tìm kiếm và danh sách thành viên sẽ render ở đây -->
            </div>
        </div>

        <!-- MODAL QUÊN MẬT KHẨU -->
        <div id="forgot-password-modal" class="modal hidden">
            <div class="modal-content">
                <h3 style="text-align: center; margin-bottom: 10px;">🔐 Khôi phục mật khẩu</h3>
                <input type="tel" id="forgot-phone" placeholder="Số điện thoại...">
                <input type="number" id="forgot-pin" placeholder="Nhập mã PIN 4 số..." oninput="if(this.value.length > 4) this.value = this.value.slice(0, 4);">
                <input type="password" id="forgot-new-password" placeholder="Mật khẩu mới...">
                <div class="modal-actions">
                    <button id="btn-cancel-forgot" class="btn btn-secondary btn-3d" style="width: 50%;">Hủy</button>
                    <button id="btn-submit-forgot" class="btn btn-primary btn-3d" style="width: 50%;">Xác nhận</button>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
