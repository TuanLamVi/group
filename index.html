<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Quỹ Nhóm</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- MÀN HÌNH ĐĂNG NHẬP -->
        <div id="login-screen" class="screen">
            <div class="card login-card">
                <h2>Đăng nhập</h2>
                <p>Quản lý quỹ nhóm minh bạch</p>
                <input type="tel" id="phone-input" placeholder="Nhập số điện thoại..." autocomplete="off">
                <button id="login-btn" class="btn btn-primary">Vào ứng dụng</button>
            </div>
        </div>

        <!-- MÀN HÌNH CHÍNH -->
        <div id="main-screen" class="screen hidden">
            <!-- Thẻ hiển thị số dư chung -->
            <div class="card balance-card">
                <h3>Nhóm: <span id="group-name">Đang tải...</span></h3>
                <p class="balance-title">Số dư quỹ chung</p>
                <h1 class="balance-amount"><span id="balance">0</span> ₫</h1>
            </div>

            <!-- Các nút thao tác -->
            <div class="action-buttons">
                <button id="btn-income" class="btn btn-success">➕ Thu tiền</button>
                <button id="btn-expense" class="btn btn-danger">➖ Chi tiền</button>
            </div>

            <!-- Khu vực Quỹ Sự Kiện -->
            <div class="campaign-section">
                <div class="section-header">
                    <h3>Quỹ Sự Kiện Đang Chạy</h3>
                    <button id="btn-create-campaign" class="btn-sm btn-primary">➕ Tạo sự kiện</button>
                </div>
                <div id="campaign-list" class="campaign-list">
                    <!-- Danh sách sự kiện sẽ hiển thị ở đây -->
                </div>
            </div>

            <!-- Khu vực hiển thị danh sách giao dịch -->
            <div class="recent-transactions">
                <h3>Hoạt động gần đây</h3>
                <ul id="transaction-list" class="transaction-list"></ul>
            </div>
        </div>
    </div>

    <!-- MODAL NHẬP GIAO DỊCH -->
    <div id="tx-modal" class="modal hidden">
        <div class="modal-content">
            <h3 id="tx-modal-title">Thêm Giao Dịch</h3>
            <input type="number" id="tx-amount" placeholder="Nhập số tiền (VNĐ)...">
            <input type="text" id="tx-desc" placeholder="Mô tả (Ví dụ: Thu tiền vé, Mua nước...)">
            
            <label for="tx-campaign-select">Nguồn tiền:</label>
            <select id="tx-campaign-select">
                <option value="">-- Quỹ chung của nhóm --</option>
                <!-- Các sự kiện đang chạy sẽ được tự động thêm vào đây -->
            </select>
            
            <div class="modal-actions">
                <button id="btn-cancel-tx" class="btn btn-secondary">Hủy</button>
                <button id="btn-submit-tx" class="btn btn-success">Xác nhận</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
