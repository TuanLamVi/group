<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Quỹ Nhóm</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- MÀN HÌNH 1: ĐĂNG NHẬP -->
        <div id="login-screen" class="screen">
            <div class="card login-card">
                <h2>Đăng nhập</h2>
                <p>Quản lý quỹ nhóm minh bạch</p>
                <input type="tel" id="phone-input" placeholder="Nhập số điện thoại..." autocomplete="off">
                <button id="login-btn" class="btn btn-primary">Vào ứng dụng</button>
            </div>
        </div>

        <!-- MÀN HÌNH 2: DANH SÁCH NHÓM (DASHBOARD) -->
        <div id="dashboard-screen" class="screen hidden">
            <div class="section-header">
                <h2>Các Nhóm Của Tôi</h2>
                <button id="btn-create-group" class="btn-sm btn-primary">➕ Tạo nhóm</button>
            </div>
            <p style="font-size: 14px; margin-bottom: 15px; color: gray;">Đăng nhập với số: <b id="display-user-phone"></b></p>
            <div id="group-list" class="group-list">
                <!-- Danh sách nhóm sẽ tự động đổ vào đây -->
            </div>
        </div>

        <!-- MÀN HÌNH 3: CHI TIẾT NHÓM (MAIN SCREEN) -->
        <div id="main-screen" class="screen hidden">
            <button id="btn-back-dashboard" class="btn-sm btn-secondary" style="margin-bottom: 15px;">🔙 Trở về danh sách</button>
            
            <div class="card balance-card">
                <h3>Nhóm: <span id="group-name">Đang tải...</span></h3>
                <p class="balance-title">Số dư quỹ chung</p>
                <h1 class="balance-amount"><span id="balance">0</span> ₫</h1>
                <p style="font-size: 12px; margin-top: 10px; color: #ffd700;">Vai trò: <span id="user-role">...</span></p>
            </div>

            <div class="action-buttons">
                <button id="btn-income" class="btn btn-success">➕ Thu tiền</button>
                <button id="btn-expense" class="btn btn-danger">➖ Chi tiền</button>
            </div>

            <!-- Đề xuất chờ duyệt -->
            <div id="pending-section" class="recent-transactions hidden">
                <h3 style="color: #dc3545;">⚠️ Đề xuất chờ duyệt</h3>
                <ul id="pending-list" class="transaction-list"></ul>
            </div>

            <!-- Sự Kiện -->
            <div class="campaign-section">
                <div class="section-header">
                    <h3>Quỹ Sự Kiện</h3>
                    <button id="btn-create-campaign" class="btn-sm btn-primary hidden">➕ Tạo</button>
                </div>
                <div id="campaign-list" class="campaign-list"></div>
            </div>

            <!-- Thành viên -->
            <div class="campaign-section">
                <div class="section-header">
                    <h3>Thành viên nhóm</h3>
                    <button id="btn-add-member" class="btn-sm btn-secondary hidden">➕ Mời bạn</button>
                </div>
                <div id="member-list" class="transaction-list" style="padding: 10px; background: #fff; border-radius: 8px; font-size: 14px;"></div>
            </div>

            <!-- Lịch sử -->
            <div class="recent-transactions" style="margin-top: 20px;">
                <h3>Lịch sử quỹ</h3>
                <ul id="transaction-list" class="transaction-list"></ul>
            </div>
        </div>
    </div>

    <!-- MODAL NHẬP GIAO DỊCH -->
    <div id="tx-modal" class="modal hidden">
        <div class="modal-content">
            <h3 id="tx-modal-title">Thêm Giao Dịch</h3>
            <input type="number" id="tx-amount" placeholder="Nhập số tiền (VNĐ)...">
            <input type="text" id="tx-desc" placeholder="Mô tả...">
            <label for="tx-campaign-select">Nguồn tiền:</label>
            <select id="tx-campaign-select">
                <option value="">-- Quỹ chung của nhóm --</option>
            </select>
            <div class="modal-actions">
                <button id="btn-cancel-tx" class="btn btn-secondary">Hủy</button>
                <button id="btn-submit-tx" class="btn btn-success">Xác nhận</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
