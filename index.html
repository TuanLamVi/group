<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Quỹ Nhóm</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- MÀN HÌNH ĐĂNG NHẬP -->
        <div id="login-screen" class="screen">
            <div class="card login-card">
                <h2>Đăng nhập</h2>
                <p>Quản lý quỹ nhóm minh bạch</p>
                <input type="tel" id="phone-input" placeholder="Nhập số điện thoại..." autocomplete="off">
                <button id="login-btn" class="btn btn-primary">Vào ứng dụng</button>
            </div>
        </div>

        <!-- MÀN HÌNH CHÍNH (Ẩn lúc đầu) -->
        <div id="main-screen" class="screen hidden">
            <!-- Thẻ hiển thị số dư -->
            <div class="card balance-card">
                <h3>Nhóm: <span id="group-name">Chưa chọn nhóm</span></h3>
                <p class="balance-title">Số dư hiện tại</p>
                <h1 class="balance-amount"><span id="balance">0</span> ₫</h1>
            </div>

            <!-- Các nút thao tác -->
            <div class="action-buttons">
                <button id="btn-income" class="btn btn-success">➕ Thu tiền</button>
                <button id="btn-expense" class="btn btn-danger">➖ Chi tiền</button>
                <button id="btn-history" class="btn btn-secondary">📜 Lịch sử</button>
            </div>

            <!-- Khu vực hiển thị danh sách giao dịch gần đây -->
            <div class="recent-transactions">
                <h3>Hoạt động gần đây</h3>
                <ul id="transaction-list" class="transaction-list">
                    <!-- Dữ liệu mẫu, sau này sẽ đổ từ Firebase vào -->
                    <li class="transaction-item">
                        <div class="tx-info">
                            <span class="tx-desc">Chưa có giao dịch nào</span>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <!-- Gọi file JS chứa logic -->
    <script type="module" src="app.js"></script>
</body>
</html>
